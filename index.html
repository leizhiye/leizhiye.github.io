<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #888888;
            --light-gray: #f0f0f0;
        }

        body {
            font-family: 'Space Mono', 'Noto Serif SC', monospace;
            background-color: var(--white);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 噪点纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 22vh;
        }

        /* 标题轮播区域 */
        .hero-title {
            width: 100%;
            text-align: center;
            height: 120px;
            position: relative;
            overflow: hidden;
        }

        .title-item {
            position: absolute;
            width: 100%;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(1.8rem, 4.5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: 0.05em;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            pointer-events: none;
        }

        .title-item.active {
            opacity: 1;
            transform: translateY(-50%);
        }

        .title-item.exit {
            opacity: 0;
            transform: translateY(-80%);
        }

        .title-item.enter {
            opacity: 0;
            transform: translateY(80%);
        }

        /* 装饰分隔线 */
        .divider {
            width: 40px;
            height: 2px;
            background-color: var(--black);
            margin: 48px 0;
            opacity: 0.2;
        }

        /* 按钮区域 */
        .button-group {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 20px 56px;
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-decoration: none;
            color: var(--black);
            background-color: var(--white);
            border: 2px solid var(--black);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--black);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .btn:hover {
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--gray);
            letter-spacing: 0.1em;
            z-index: 1;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .container {
                margin-top: 18vh;
            }

            .hero-title {
                height: 100px;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }

            .btn {
                width: 100%;
                max-width: 320px;
                padding: 18px 40px;
            }

            .divider {
                margin: 36px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-title" id="heroTitle">
            <div class="title-item active">欢迎来到这个闲的没事干的网站</div>
            <div class="title-item">随便看看</div>
        </div>

        <div class="divider"></div>

        <div class="button-group">
            <a href="https://harbor-uyqf.upma.site/" class="btn" target="_blank" rel="noopener noreferrer">恶搞恋人</a>
            <a href="./apple.html" class="btn">旋转苹果</a>
        </div>
    </div>

    <div class="footer">闲的没事干</div>

    <script>
        (function() {
            const container = document.getElementById('heroTitle');
            const items = container.querySelectorAll('.title-item');
            let current = 0;
            const interval = 3000;

            function cycle() {
                const next = (current + 1) % items.length;
                const currentEl = items[current];
                const nextEl = items[next];

                currentEl.classList.remove('active');
                currentEl.classList.add('exit');

                nextEl.classList.remove('enter', 'exit');
                nextEl.classList.add('active');

                // 重置其他元素位置
                items.forEach((item, index) => {
                    if (index !== current && index !== next) {
                        item.classList.remove('active', 'exit');
                        item.classList.add('enter');
                    }
                });

                current = next;
            }

            // 初始化非当前项的位置
            items.forEach((item, index) => {
                if (index !== current) {
                    item.classList.add('enter');
                }
            });

            setInterval(cycle, interval);
        })();
    </script>
</body>
</html>
